{% extends 'lessons/index.html' %}
{% load static %}
{% block title %}Авторизація{% endblock %}

{% block page %}
<div class="login-wrapper">
    <div class="login-card">
        <h1>Авторизація</h1>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                {{ form.username.label_tag }}
                {{ form.username }}
            </div>

            <div class="form-group">
                {{ form.password.label_tag }}
                {{ form.password }}
            </div>

            <button type="submit" class="btn-login">Увійти</button>
        </form>
    </div>
</div>
{% endblock page %}
